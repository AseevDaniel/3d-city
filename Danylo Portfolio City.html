document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ster-art {\n    background: linear-gradient(135deg, #5b3ba8, #2a2347); color: #ffd84d;\n    border-radius: 8px; height: 84px; display: grid; place-items: center;\n    font-weight: 800; font-size: 13px; text-align: center; padding: 6px; margin-bottom: 8px;\n  }\n  .poster-title { font-weight: 700; font-size: 12.5px; }\n  .poster-sub { font-size: 11px; color: var(--muted); }\n  .poster-rating { font-size: 12px; color: #c9952c; margin-top: 3px; }\n  .progress-wrap { background: #f1f0ec; border-radius: 999px; height: 12px; overflow: hidden; margin: 16px 0 8px; }\n  .progress-bar {\n    height: 100%; width: 0; border-radius: 999px;\n    background: repeating-linear-gradient(45deg, #e8a13a 0 10px, #d4922f 10px 20px);\n    animation: build 3s ease-out forwards;\n  }\n  @keyframes build { to { width: 38%; } }\n  .progress-label { font-size: 12px; color: var(--muted); }\n  .cta-btn {\n    display: inline-block; background: var(--ink); color: #fff; text-decoration: none;\n    font-weight: 600; font-size: 14px; font-family: inherit; padding: 11px 20px; border-radius: 999px;\n    border: none; cursor: pointer; margin-top: 10px; transition: background 0.15s;\n  }\n  .cta-btn:hover { background: #3a3f47; }\n\n  /* ── arcade game ── */\n  .game-hud { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 10px; }\n  .game-hud b { color: var(--ink); font-size: 16px; margin-left: 4px; }\n  .game-field {\n    position: relative; height: 280px; background: #f1f7ec; border-radius: 14px;\n    border: 2px dashed #cfd8c4; overflow: hidden; display: grid; place-items: center;\n  }\n  .game-note { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }\n  .bug {\n    position: absolute; width: 34px; height: 26px; cursor: crosshair;\n    background: radial-gradient(ellipse at 50% 40%, #4a4a52 60%, #2c2c33 100%);\n    border-radius: 50% 50% 46% 46%; transform: rotate(var(--r, 0deg)) scale(0);\n    animation: bug-in 0.18s forwards;\n  }\n  .bug::before, .bug::after {\n    content: ''; position: absolute; width: 40px; height: 2.5px; background: #2c2c33;\n    left: -3px; border-radius: 2px;\n  }\n  .bug::before { top: 6px; transform: rotate(-18deg); }\n  .bug::after { bottom: 6px; transform: rotate(18deg); }\n  @keyframes bug-in { to { transform: rotate(var(--r, 0deg)) scale(1); } }\n  .bug.dead { background: #1f8a5b; transition: transform 0.22s, opacity 0.22s; transform: rotate(var(--r)) scale(1.6); opacity: 0; }\n  .bug.escaped { transition: transform 0.28s, opacity 0.28s; transform: rotate(var(--r)) scale(0.4) translateY(-30px); opacity: 0; }\n  .game-over { text-align: center; }\n  .game-over .go-score { font-size: 52px; font-weight: 800; }\n\n  /* ── mobile ── */\n  @media (max-width: 760px) {\n    #panel { top: auto; left: 10px; right: 10px; bottom: 10px; width: auto; height: 62vh;\n      transform: translateY(calc(100% + 20px)); }\n    #panel.open { transform: translateY(0); }\n    #navbar { bottom: auto; top: 72px; }\n    #navbar.shifted { transform: translateX(-50%); }\n    #brand { padding: 9px 13px; }\n    #hint { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div id=\"scene-host\"><\u002Fdiv>\n\n  <div id=\"loader\">\n    <div class=\"city-glyph\">🏗️<\u002Fdiv>\n    <h1>DANYLO ASIEIEV<\u002Fh1>\n    <p>Full-Stack Developer · building the portfolio city…<\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"brand\">\n    <h1>DANYLO ASIEIEV<\u002Fh1>\n    <p>Full-Stack Developer · React / Next.js / Node.js<\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"hint\">Drag to orbit · Scroll to zoom · Tab / ←→ select · Enter open<\u002Fdiv>\n  <div id=\"tooltip\"><div class=\"tt-title\"><\u002Fdiv><div class=\"tt-sub\"><\u002Fdiv><\u002Fdiv>\n\n  <nav id=\"navbar\">\n    <button class=\"primary\" data-go=\"about\">About<\u002Fbutton>\n    <button class=\"primary\" data-go=\"skills\">Skills<\u002Fbutton>\n    <button class=\"primary\" data-go=\"contacts\">Contacts<\u002Fbutton>\n    <span class=\"sep s/FontLoader.js', 'fontLoaderJs'],\n      ['three/addons/geometries/TextGeometry.js', 'textGeometryJs'],\n      ['three/addons/utils/BufferGeometryUtils.js', 'bufferGeometryUtilsJs'],\n      ['__city/core', 'cityCore'],\n      ['__city/life', 'cityLife'],\n      ['__city/interactions', 'cityInteractions'],\n    ];\n    const urls = {};\n    for (const [spec, id] of order) {\n      let code = await fetchText(R[id]);\n      for (const [s, u] of Object.entries(urls)) {\n        code = code.split(\"'\" + s + \"'\").join(\"'\" + u + \"'\");\n        code = code.split('\"' + s + '\"').join('\"' + u + '\"');\n      }\n      urls[spec] = URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));\n    }\n\n    const THREE = await import(urls['three']);\n    const { OrbitControls } = await import(urls['three/addons/controls/OrbitControls.js']);\n    const { FontLoader } = await import(urls['three/addons/loaders/FontLoader.js']);\n    const { buildCity } = await import(urls['__city/core']);\n    const { buildLife } = await import(urls['__city/life']);\n    const { initInteractions } = await import(urls['__city/interactions']);\n\n    const host = document.getElementById('scene-host');\n    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));\n    renderer.setSize(window.innerWidth, window.innerHeight);\n    renderer.shadowMap.enabled = true;\n    renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n    host.appendChild(renderer.domElement);\n\n    const scene = new THREE.Scene();\n    scene.background = new THREE.Color('#c6e4f0');\n    scene.fog = new THREE.Fog('#c6e4f0', 115, 205);\n\n    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 600);\n    camera.position.set(150, 175, 150);\n\n    const controls = new OrbitControls(camera, renderer.domElement);\n    controls.enableDamping = true;\n    controls.dampingFactor = 0.028;\n    controls.rotateSpeed = 0.45;\n    controls.zoomSpeed = 0.65;\n    controls.panSpeed = 0.6;\n    controls.minDistance = 30;\n    controls.maxDistance = 105;\n    controls.minPolarAngle = 0.62;\n    controls.maxPolarAngle = 1.13;\n    controls.minAzimuthAngle = Math.PI / 4 - 0.35;\n    controls.maxAzimuthAngle = Math.PI / 4 + 0.35;\n    controls.target.set(0, 2, 0);\n\n    // smooth inertial zoom\n    let zoomVel = 0;\n    host.addEventListener('wheel', (e) => {\n      e.preventDefault();\n      e.stopPropagation();\n      if (controls.enabled) zoomVel += Math.sign(e.deltaY) * Math.min(Math.abs(e.deltaY), 50) * 0.00016;\n    }, { capture: true, passive: false });\n\n    // lights\n    scene.add(new THREE.HemisphereLight('#d6ecff', '#86c061', 0.95));\n    const sun = new THREE.DirectionalLight('#fff2d4', 2.45);\n    sun.position.set(64, 86, 46);\n    sun.castShadow = true;\n    sun.shadow.mapSize.set(2048, 2048);\n    sun.shadow.camera.left = -68; sun.shadow.camera.right = 68;\n    sun.shadow.camera.top = 68; sun.shadow.camera.bottom = -68;\n    sun.shadow.camera.far = 240;\n    sun.shadow.bias = -0.0004;\n    sun.shadow.normalBias = 0.5;\n    scene.add(sun);\n\n    const fontLoader = new FontLoader();\n    fontLoader.load(R.fontJson, (font) => {\n      const city = buildCity(scene, font);\n      const life = buildLife(scene, city);\n      const interactions = initInteractions({\n        renderer, camera, controls, city, life,\n        openPanel: (id) => window.CityUI.open(id),\n        closePanel: () => window.CityUI.close(),\n      });\n      window.CityApp = { focusById: interactions.focusById, unfocus: interactions.unfocus };\n\n      // baked settings (tweaks panel not shipped in the standalone build)\n      life.setTraffic(1);\n      life.setClouds(true);\n      sun.castShadow = true;\n\n      document.getElementById('navbar').addEventListener('click', (e) => {\n        const id = e.target.dataset && e.target.dataset.go;\n        if (id) interactions.focusById(id);\n      });\n\n      const loaderEl = document.getElementById('loader');\n      loaderEl.classList.add('hidden');\n      setTimeout(() => { loaderEl.style.display = 'none'; }, 800);\n      interactions.startTween(new THREE.Vector3(55, 52, 84), new THREE.Vector3(6, 2, 10), 2.2);\n      setTimeout(() => document.getElementById('hint').classList.add('faded'), 7000);\n\n      const clock = new THREE.Clock();\n      renderer.setAnimationLoop(() => {\n        try {\n          const dt = Math.min(clock.getDelta(), 0.05);\n          const t = clock.elapsedTime;\n          life.update(t, dt);\n          interactions.update(t, dt);\n          controls.target.x = THREE.MathUtils.clamp(controls.target.x, -32, 32);\n          controls.target.z = THREE.MathUtils.clamp(controls.target.z, -32, 32);\n          controls.target.y = THREE.MathUtils.clamp(controls.target.y, 0, 18);\n          controls.update();\n          if (controls.enabled && zoomVel !== 0) {\n            const off = camera.position.clone().sub(controls.target);\n            const dist = THREE.MathUtils.clamp(off.length() * (1 + zoomVel), controls.minDistance, controls.maxDistance);\n            camera.position.copy(controls.target).addScaledVector(off.normalize(), dist);\n            zoomVel = Math.abs(zoomVel) < 0.00005 ? 0 : zoomVel * Math.exp(-4.2 * dt);\n          }\n          renderer.render(scene, camera);\n        } catch (err) {\n          if (!window.__loopErr) { window.__loopErr = String(err.stack || err); console.error('loop error:', err); }\n        }\n      });\n    });\n\n    window.addEventListener('resize', () => {\n      camera.aspect = window.innerWidth / window.innerHeight;\n      camera.updateProjectionMatrix();\n      renderer.setSize(window.innerWidth, window.innerHeight);\n    });\n  })().catch((e) => {\n    console.error('boot failed:', e);\n    const p = document.querySelector('#loader p');\n    if (p) p.textContent = 'Failed to load: ' + e.message;\n  });\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
